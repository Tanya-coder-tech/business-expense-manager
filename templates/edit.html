<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Transaction</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <h1>Edit Transaction</h1>

    <form method="POST">

        <label>Date</label>
        <input type="date" name="date" value="{{ transaction.date }}" required>

        <label>Invoice No</label>
        <input type="text" name="invoice_no" value="{{ transaction.invoice_no }}" required>

        <label>Party</label>
        <input type="text" name="party" value="{{ transaction.party }}" required>

        <label>Purpose</label>
        <input type="text" name="purpose" value="{{ transaction.purpose }}" required>

        <label>Amount</label>
        <input type="number" step="0.01" name="amount" value="{{ transaction.amount }}" required>

        <label>Payment Mode</label>
        <input type="text" name="payment_mode" value="{{ transaction.payment_mode }}" required>

        <button type="submit">Update Transaction</button>

    </form>

    <br>

    <a href="/">
        <button>Back to Dashboard</button>
    </a>

</div>

</body>
</html>
